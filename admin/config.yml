backend:
  name: git-gateway
  branch: master
  site_id: 201ab593-6a33-44ff-8bdd-f3187fc17521

publish_mode: editorial_workflow

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "branding"
    label: "🌐 Global Branding"
    delete: false
    files:
      - name: "site_config"
        label: "Site Settings & Logo"
        file: "content/settings.json"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string", default: "PrajnaAGI" }
          - { label: "Site Tagline", name: "tagline", widget: "string", default: "ब्रह्मांड की हर खबर" }
          - { label: "Logo Text", name: "logo_text", widget: "string", default: "🌌 PrajnaAGI" }
          - { label: "Footer Copyright", name: "footer_copy", widget: "string", default: "© 2026 PrajnaAGI. सर्वाधिकार सुरक्षित।" }
          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "X (Twitter) URL", name: "x_link", widget: "string", required: false }
              - { label: "LinkedIn URL", name: "linkedin_link", widget: "string", required: false }
              - { label: "GitHub URL", name: "github_link", widget: "string", required: false }
              - label: "💰 Payment Settings (India)"
                name: "payments"
                widget: "object"
                fields:
                  - { label: "Your UPI ID", name: "upi_id", widget: "string", hint: "Example: yourname@okaxis" }
                  - { label: "UPI QR Code Image", name: "upi_qr", widget: "image", required: false }
                  - { label: "Razorpay / External Link", name: "pay_link", widget: "string", required: false, hint: "Link to your Razorpay Payment Page or Button" }

  - name: "pages"
    label: "📄 Content Management"
    files:
      - name: "articles"
        label: "📰 Articles (Main News)"
        file: "content/articles.json"
        fields:
          - label: "Articles List"
            name: "articles"
            widget: "list"
            fields:
              - { label: "Title (Hindi)", name: "title", widget: "string" }
              - { label: "Short ID (For Clean Link)", name: "slug", widget: "string", hint: "Example: quantum-success (Use English, no spaces)" }
              - { label: "Category", name: "category", widget: "select", options: ["तकनीक", "विज्ञान", "अंतरिक्ष", "पर्यावरण", "स्वास्थ्य"] }
              - { label: "Tag / Emoji", name: "tag", widget: "string", default: "⭐ Featured" }
              - { label: "Typography (Font)", name: "font_family", widget: "select", options: ["Noto Sans Devnagari", "Tiro Devanagari Hindi", "Inter", "Roboto"], default: "Noto Sans Devnagari" }
              - { label: "Publish Date", name: "date", widget: "datetime" }
              - { label: "Summary (short)", name: "summary", widget: "text" }
              - { label: "Full Article Body", name: "body", widget: "markdown" }
              - { label: "SEO Description", name: "meta_desc", widget: "string", hint: "Short description for Google and WhatsApp" }
              - { label: "Social Image (OG Image)", name: "social_image", widget: "image", required: false, hint: "Image that appears when shared on X/WhatsApp" }
              - { label: "Cover Image URL", name: "image", widget: "image", required: false }
              - label: "🛒 Recommended Products (Affiliate)"
                name: "products"
                widget: "list"
                required: false
                fields:
                  - { label: "Product Name", name: "name", widget: "string" }
                  - { label: "Affiliate Link", name: "link", widget: "string" }
                  - { label: "Product Image", name: "image", widget: "image", required: false }
                  - { label: "Quick Desc / Why buy?", name: "desc", widget: "string" }
                  - { label: "Button Text", name: "btn_text", widget: "string", default: "अभी खरीदें" }

      - name: "facts"
        label: "🌟 Did You Know? (Facts)"
        file: "content/facts.json"
        fields:
          - label: "Facts List"
            name: "facts"
            widget: "list"
            fields:
              - { label: "Emoji Icon", name: "icon", widget: "string", default: "🌌" }
              - { label: "Fact Text (Hindi)", name: "fact_text", widget: "text" }
              - { label: "Detailed Explanation", name: "detail", widget: "markdown" }

      - name: "ticker"
        label: "📡 Breaking News Ticker"
        file: "content/ticker.json"
        fields:
          - label: "Ticker Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Headline", name: "text", widget: "string" }

  - name: "categories"
    label: "📁 Category Management"
    files:
      - name: "cat_settings"
        label: "Category Headers"
        file: "content/categories.json"
        fields:
          - label: "Categories Setup"
            name: "categories"
            widget: "list"
            fields:
              - { label: "Category Name", name: "id", widget: "string" }
              - { label: "Header Title (Hindi)", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Header Background Image", name: "bg_image", widget: "image" }
