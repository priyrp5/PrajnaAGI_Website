<style>
  :root { --transition-theme: background 0.35s ease, color 0.35s ease; }
  [data-theme="dark"] { --bg:#080808; --surface:#1a1a1a; --text:#f0f0f0; --accent:#F4C430; --btn-text:#080808; }
  [data-theme="light"] { --bg:#f7f6f2; --surface:#ffffff; --text:#111111; --accent:#D4AA00; --btn-text:#ffffff; }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans Devanagari',sans-serif;margin:0;overflow-x:hidden;}

  .snap-container{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;}
  .space-section{height:100vh;width:100%;scroll-snap-align:start;background-size:cover;background-position:center;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-start;padding:10vh 5vw;position:relative;}
  .space-section::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.9) 0%,transparent 60%);z-index:1;pointer-events:none;}
  .space-content{position:relative;z-index:2;max-width:800px;animation:fadeInUp 1s ease forwards;opacity:0;transform:translateY(20px);}
  .space-title{font-family:'Tiro Devanagari Hindi',serif;font-size:4.5rem;color:#fff;margin-bottom:1rem;line-height:1.1;text-shadow:0 4px 20px rgba(0,0,0,0.5);}
  .space-desc{font-size:1.2rem;color:#ccc;margin-bottom:2rem;line-height:1.6;}
  .btn-outline{border:2px solid #fff;padding:12px 35px;color:#fff;background:rgba(0,0,0,0.3);text-transform:uppercase;font-weight:bold;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(5px);font-size:0.9rem;letter-spacing:1px;}
  .btn-outline:hover{background:#fff;color:#000;}
  @keyframes fadeInUp{to{opacity:1;transform:translateY(0);}}
</style>
<style>

}
[data-theme="light"] {

}
nav { position:fixed; top:0; left:0; width:100%; z-index:1000; background:var(--nav-bg) !important; backdrop-filter:blur(18px) !important; -webkit-backdrop-filter:blur(18px); border-bottom:1px solid var(--border) !important; padding:0 2rem !important; transition:background 0.4s; display:flex !important; }
.nav-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:70px; width:100%; }
.brand-container { display:flex; align-items:center; gap:12px; }
#headerBlackHole { width:50px; height:50px; flex-shrink:0; }
.logo { font-family:'Tiro Devanagari Hindi',serif; font-size:1.7rem !important; text-decoration:none; color:var(--text-main) !important; font-weight:bold; white-space:nowrap; }
.logo span { color:var(--accent) !important; font-family:'Noto Sans Devanagari',sans-serif !important;}
.menu-tabs { display:flex !important; gap:18px !important; list-style:none !important; margin-left:28px !important; }
.menu-tabs li a { text-decoration:none !important; color:var(--text-main) !important; font-weight:500 !important; font-size:0.92rem !important; opacity:0.8; transition:var(--transition); white-space:nowrap; }
.menu-tabs li a:hover { color:var(--accent) !important; opacity:1; text-shadow:0 0 10px var(--accent-glow); }
.nav-controls { display:flex; gap:10px; align-items:center; }
#theme-toggle { background:none; border:1px solid var(--border); color:var(--accent); padding:8px 16px; border-radius:50px; cursor:pointer; font-weight:700; font-size:0.85rem; font-family:'Noto Sans Devanagari',sans-serif; transition:var(--transition); }
#theme-toggle:hover { background:var(--accent); color:#000; }
.subscribe-nav-btn { background:var(--accent); border:none; padding:0.7rem 1.3rem; border-radius:8px; font-weight:800; cursor:pointer; color:#000; font-size:0.85rem; font-family:'Noto Sans Devanagari',sans-serif; transition:var(--transition); white-space:nowrap; }
.subscribe-nav-btn:hover { opacity:0.85; transform:translateY(-1px); }
.hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none; padding:5px; }
.hamburger span { display:block; width:24px; height:2px; background:var(--accent); border-radius:2px; transition:var(--transition); }
.hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity:0; }
.hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
.mobile-menu { display:none; background:var(--nav-bg); backdrop-filter:blur(18px); border-bottom:1px solid var(--border); max-height:0; overflow:hidden; transition:max-height 0.4s ease,padding 0.3s ease; position:fixed; width:100%; z-index:999; left:0; top:70px;}
.mobile-menu.open { max-height:500px; padding:1rem 0; }
.mobile-menu ul { list-style:none; max-width:1400px; margin:0 auto; padding:0 2rem; }
.mobile-menu ul li a { display:block; text-decoration:none; color:var(--text-main); font-weight:500; font-size:1rem; padding:0.85rem 0; border-bottom:1px solid var(--border); transition:var(--transition); }
.mobile-menu ul li:last-child a { border-bottom:none; }
.mobile-menu ul li a:hover { color:var(--accent); padding-left:8px; }
@media (max-width:1024px) { .menu-tabs { display:none !important; } .hamburger { display:flex !important; } .mobile-menu { display:block !important; } }
@media (max-width:768px) { .nav-inner { height:62px; } .subscribe-nav-btn { display:none; } }
@media (max-width:480px) { .logo { font-size:1.4rem !important; } #headerBlackHole { width:40px; height:40px; } }

<script>
    if (typeof isDark === 'undefined') {
        window.isDark = function() {
            return document.body.getAttribute('data-theme') !== 'light';
        }
    }

    const hCanvas = document.getElementById('headerBlackHole');
    if (hCanvas) {
        const hCtx = hCanvas.getContext('2d');
        hCanvas.width = hCanvas.height = 110;
        let timeHeader = 0;
        function drawHeaderHole() {
            timeHeader += 0.015;
            hCtx.clearRect(0, 0, 110, 110);
            hCtx.save();
            hCtx.translate(55, 55);
            hCtx.rotate(timeHeader * 2.2);
            const g = hCtx.createRadialGradient(0, 0, 8, 0, 0, 44);
            g.addColorStop(0,   '#000');
            g.addColorStop(0.3, 'rgba(225,173,1,0.75)');
            g.addColorStop(1,   'transparent');
            hCtx.fillStyle = g;
            hCtx.beginPath();
            hCtx.ellipse(0, 0, 50, 14, 0, 0, Math.PI * 2);
            hCtx.fill();
            hCtx.fillStyle = '#000';
            hCtx.beginPath();
            hCtx.arc(0, 0, 15, 0, Math.PI * 2);
            hCtx.fill();
            hCtx.restore();
            requestAnimationFrame(drawHeaderHole);
        }
        drawHeaderHole();
    }

    const themeBtn = document.getElementById('theme-toggle');
    if (themeBtn) {
        themeBtn.addEventListener('click', function () {
            const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            this.textContent = next === 'light' ? '🌙 रात' : '☀️ दिन';
        });
    }

    const hamburger  = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    if (hamburger && mobileMenu) {
        hamburger.addEventListener('click', function () {
            const isOpen = mobileMenu.classList.toggle('open');
            hamburger.classList.toggle('open', isOpen);
            this.setAttribute('aria-label', isOpen ? 'मेनू बंद करें' : 'मेनू खोलें');
        });
    }

    // Load dynamic articles
    document.addEventListener('DOMContentLoaded', () => {
        loadCMSSpace('cms-space-snap');
    });
</script>
